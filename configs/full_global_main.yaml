defaults:
  - base

exp_name: vs3d_full_global_main

editing:
  method: flowedit
  update_form: parallelogram
  rasi:
    enabled: true
  pmg:
    enabled: true
    w: 1.2
    L: 2
  tar:
    enabled: true
    lam: 0.5
    tau: 10.0
    theta: 0.7
  crop:
    enabled: true
    mode: multi
    main_direction: global   # main axis = global vΔ, not largest crop               # multi-crop (connected components) + SplitFlow aggregation
    padding_scale: 1.2        # per-crop bbox expansion
    diff_threshold: 35        # RGB-diff threshold
    blur_radius: 3
    top_k: 0                  # 0 = ALL significant connected components (no cap)
    min_component: 150        # ignore components smaller than this (px)
    morph_open_iters: 2       # remove speckle before component analysis
    min_side_frac: 0.25       # each crop covers >=25% side (keep context)
    agg_temp: 0.1             # SplitFlow VFA softmax temperature
    guidance_scale: 0.5       # weight for the aggregated crop velocity signal
